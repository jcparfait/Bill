name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Rails test suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: the_bartender_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      PARALLEL_WORKERS: 1
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/the_bartender_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Prepare test database
        run: bin/rails db:schema:load

      - name: Run Rails tests
        run: bin/rails test

      - name: Run Brakeman
        continue-on-error: true
        run: bundle exec brakeman --quiet --no-pager --no-exit-on-warn --no-exit-on-error
