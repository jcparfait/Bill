<!doctype html>
<html lang="fr">
  <head>
    <title>Bill - Erreur serveur</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 32px;
        color: #fff8ec;
        background:
          radial-gradient(circle at 50% 20%, rgba(255, 248, 236, 0.12), transparent 28rem),
          linear-gradient(135deg, #070706, #15120f 48%, #070706);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(560px, 100%);
        padding: 42px;
        border: 1px solid rgba(255, 248, 236, 0.18);
        border-radius: 28px;
        background: rgba(10, 10, 9, 0.72);
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
        text-align: center;
      }
      img { width: 72px; height: 72px; object-fit: contain; margin-bottom: 24px; }
      p.kicker {
        margin: 0 0 14px;
        color: #c9a86a;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.28em;
        text-transform: uppercase;
      }
      h1 { margin: 0 0 16px; font-size: clamp(2rem, 8vw, 4.5rem); line-height: 1; }
      p { margin: 0 auto 28px; max-width: 34rem; color: rgba(255, 248, 236, 0.78); font-size: 1.05rem; line-height: 1.6; }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 22px;
        border-radius: 999px;
        color: #070706;
        background: #fff8ec;
        font-weight: 800;
        text-decoration: none;
      }
      @media (max-width: 640px) { main { padding: 30px 22px; } }
    </style>
  </head>
  <body>
    <main>
      <img src="/icon.png" alt="Bill">
      <p class="kicker">Erreur 500</p>
      <h1>Bill a renversé quelque chose.</h1>
      <p>Le serveur a trébuché derrière le comptoir. Rien de personnel, probablement juste une olive mal placée.</p>
      <a href="/">Retour au comptoir</a>
    </main>
  </body>
</html>
